<svg width="900" height="320" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="white"/>
  <text x="60" y="42" font-size="28" font-family="Arial">Counting Rule in a Finite Crystal</text>
  <text x="60" y="72" font-size="16" font-family="Arial" fill="#555">A simple visual summary of the spectrum organization.</text>
  <rect x="110" y="120" width="640" height="42" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="110" y="108" font-size="18" font-family="Arial">allowed band</text>
  <line x1="110" y1="235" x2="750" y2="235" stroke="#111827" stroke-width="2"/>
  <text x="110" y="262" font-size="18" font-family="Arial">band gap</text>
  <g fill="#2563eb">
    <circle cx="170" cy="141" r="8"/><circle cx="245" cy="141" r="8"/><circle cx="320" cy="141" r="8"/><circle cx="395" cy="141" r="8"/><circle cx="470" cy="141" r="8"/><circle cx="545" cy="141" r="8"/><circle cx="620" cy="141" r="8"/>
  </g>
  <circle cx="430" cy="235" r="9" fill="#dc2626"/>
  <text x="448" y="240" font-size="17" font-family="Arial">one state per gap (if present)</text>
  <text x="250" y="190" font-size="22" font-family="Arial" fill="#1d4ed8">N − 1 bulk states in each band</text>
</svg>
